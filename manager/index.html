<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Devboard Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e; --panel: #141716; --line: #1e2a22;
    --text: #e8ece9; --dim: #6a8a70; --accent: #6c5ce7; --danger: #e05858;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 24px; min-height: 100vh;
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }
  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--line); padding: 20px 0 14px; margin-bottom: 24px;
  }
  .eyebrow {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase;
  }
  h1 { margin: 2px 0 0; font-size: 24px; font-weight: 700; }
  .meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim); text-align: right; }
  .meta button {
    margin-left: 10px; background: none; border: 1px solid var(--line); border-radius: 6px;
    color: var(--dim); font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 4px 10px; cursor: pointer;
  }
  .meta button:hover { color: var(--text); border-color: var(--accent); }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
  }
  .card .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .name { font-size: 17px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .port {
    font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent);
    border: 1px solid #6c5ce744; background: #6c5ce714;
    padding: 2px 8px; border-radius: 20px; flex: none;
  }
  .path {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--dim);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .uptime { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dim); }
  .uptime b { color: var(--text); font-weight: 500; }
  .actions { display: flex; gap: 8px; margin-top: 2px; }
  .actions button {
    flex: 1; padding: 8px 0; border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  }
  .open-btn { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
  .open-btn:hover { filter: brightness(1.12); }
  .stop-btn { background: none; border: 1px solid #e0585855; color: var(--danger); }
  .stop-btn:hover { background: #e0585818; }
  .stop-btn:disabled { opacity: 0.5; cursor: wait; }
  #empty {
    border: 1px dashed var(--line); border-radius: 12px; padding: 48px 20px;
    text-align: center; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 13px;
  }
  #empty .hint { margin-top: 8px; font-size: 11px; opacity: 0.7; }
</style>
</head>
<body>
  <header>
    <div>
      <div class="eyebrow">Devboard</div>
      <h1>Manager</h1>
    </div>
    <div class="meta">
      <span id="status">scanning…</span>
      <button id="refresh-now" title="Refresh now">↺ refresh</button>
    </div>
  </header>
  <div id="grid"></div>
  <div id="empty" hidden>
    no running devboard instances found
    <div class="hint">start one with «npm run dev» inside a project's devboard folder</div>
  </div>

<script>
const SCAN_PORTS = Array.from({ length: 18 }, (_, i) => 5173 + i);
const REFRESH_MS = 5000;
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const status = document.getElementById('status');

async function probe(port) {
  const res = await fetch(`http://localhost:${port}/api/manager/info`, {
    signal: AbortSignal.timeout(1500), cache: 'no-store',
  });
  if (!res.ok) throw new Error('bad status');
  const info = await res.json();
  if (!info || typeof info.port !== 'number' || !info.projectName) throw new Error('not a devboard');
  return info;
}

// Discovery: scan the default Vite port range, then ask any live instance for
// the central registry and probe any extra ports listed there (instances that
// auto-incremented far beyond the usual range).
async function discover() {
  const found = new Map();
  const collect = (settled) => {
    for (const r of settled) if (r.status === 'fulfilled') found.set(r.value.port, r.value);
  };
  collect(await Promise.allSettled(SCAN_PORTS.map(probe)));

  const first = found.values().next().value;
  if (first) {
    try {
      const res = await fetch(`http://localhost:${first.port}/api/manager/registry`, {
        signal: AbortSignal.timeout(1500), cache: 'no-store',
      });
      const reg = await res.json();
      const extra = (reg.instances ?? [])
        .map(i => i.port)
        .filter(p => Number.isInteger(p) && !found.has(p) && !SCAN_PORTS.includes(p));
      collect(await Promise.allSettled([...new Set(extra)].map(probe)));
    } catch {}
  }
  return [...found.values()].sort((a, b) => a.port - b.port);
}

function uptime(startedAt) {
  let s = Math.max(0, Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000));
  const d = Math.floor(s / 86400); s %= 86400;
  const h = Math.floor(s / 3600);  s %= 3600;
  const m = Math.floor(s / 60);    s %= 60;
  if (d) return `${d}d ${h}h ${m}m`;
  if (h) return `${h}h ${m}m`;
  if (m) return `${m}m ${s}s`;
  return `${s}s`;
}

async function stopInstance(info, btn) {
  if (!confirm(`Stop the "${info.projectName}" board on port ${info.port}?`)) return;
  btn.disabled = true;
  btn.textContent = 'stopping…';
  try { await fetch(`http://localhost:${info.port}/api/manager/stop`, { method: 'DELETE' }); } catch {}
  setTimeout(refresh, 800);
}

function render(instances) {
  grid.replaceChildren();
  empty.hidden = instances.length > 0;
  for (const info of instances) {
    const card = document.createElement('div');
    card.className = 'card';

    const top = document.createElement('div');
    top.className = 'top';
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = info.projectName;
    const port = document.createElement('span');
    port.className = 'port';
    port.textContent = ':' + info.port;
    top.append(name, port);

    const path = document.createElement('div');
    path.className = 'path';
    path.textContent = info.path ?? '';
    path.title = info.path ?? '';

    const up = document.createElement('div');
    up.className = 'uptime';
    up.innerHTML = 'up <b></b>';
    up.querySelector('b').textContent = uptime(info.startedAt);

    const actions = document.createElement('div');
    actions.className = 'actions';
    const openBtn = document.createElement('button');
    openBtn.className = 'open-btn';
    openBtn.textContent = 'open ↗';
    openBtn.onclick = () => window.open(`http://localhost:${info.port}/`, '_blank');
    const stopBtn = document.createElement('button');
    stopBtn.className = 'stop-btn';
    stopBtn.textContent = 'stop ■';
    stopBtn.onclick = () => stopInstance(info, stopBtn);
    actions.append(openBtn, stopBtn);

    card.append(top, path, up, actions);
    grid.append(card);
  }
}

let refreshing = false;
async function refresh() {
  if (refreshing) return;
  refreshing = true;
  status.textContent = 'scanning…';
  try {
    const instances = await discover();
    render(instances);
    status.textContent = `${instances.length} running · updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    status.textContent = 'scan failed';
  } finally {
    refreshing = false;
  }
}

document.getElementById('refresh-now').onclick = refresh;
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
